name: Check OAS for Drift
on:
  schedule:
    # runs at midnight every day
    - cron: '0 0 * * *'
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - DCMAW-19246

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-oas-for-drift:
    name: Check Status List OAS for Drift
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      CRS_CHECKOUT_PATH: crs-backend
      CRS_OAS_PATH: backend/openApiSpecs/crs-private-spec.yaml
      LOCAL_OAS_PATH: openApiSpec/crs/crs-private-spec.yaml

    steps:
      - name: Generate Token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CHECKOUT_PRIVATE_REPO_GITHUB_APP_ID }}
          private-key: ${{ secrets.CHECKOUT_PRIVATE_REPO_GITHUB_APP_KEY }}
          owner: govuk-one-login
      - name: Check out repository code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Checkout CRS
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: govuk-one-login/wallet-onboarding-test-private-repo
          path: ${{ env.CRS_CHECKOUT_PATH }}
          ref: 'main'
          token: ${{ steps.generate-token.outputs.token }}

      - name: Install oasdiff
        run: curl -fsSL https://raw.githubusercontent.com/oasdiff/oasdiff/v1.11.11/install.sh | sh

      - name: Check OAS for drift
        run: oasdiff diff ${{ env.CRS_CHECKOUT_PATH }}/${{ env.CRS_OAS_PATH }} ${{ env.LOCAL_OAS_PATH }} --fail-on-diff

  notify-slack-on-failure:
    name: Notify Slack on Failure
    runs-on: ubuntu-24.04
    needs: [ check-oas-for-drift ]
    if: failure()
    steps:
      - name: Send Slack alert
        uses: slackapi/slack-github-action@b0fa283ad8fea605de13dc3f449259339835fc52 # v2.1.0
        with:
          webhook: ${{ secrets.OAS_DRIFT_BOT_SLACK_WEBHOOK_URL }} # add in repo
          webhook-type: incoming-webhook
          payload: |
            "repository": "${{ github.repository }}"
            "run": ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
#            {
#              "text": ":x: *${{ github.workflow }}* failed on `${{ github.ref_name }}`",
#              "attachments": [{
#                "color": "danger",
#                "fields": [
#                  { "title": "Repository", "value": "${{ github.repository }}", "short": true },
#                  { "title": "Run", "value": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>", "short": true }
#                ]
#              }]
#            }
