name: check-oas-for-drift.yml
on:
  schedule:
    # runs at 12:00 UTC every day
    - cron: '0 12 * * *'
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - DCMAW-18427-oas-drift

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-oas-for-drift:
    name: Check Status List OAS for Drift
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out repository code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Checkout CRS
        uses: actions/checkout@v6
        with:
          repository: govuk-one-login/crs-backend
          path: crs-backend
          ref: 'main'
          ssh-key: ${{ secrets.WALLET_CRS_DEPLOY_KEY }}

      - name: Check OAS for drift
        id: oas_diff
        uses: oasdiff/oasdiff-action/diff@v0.0.31
        with:
          base: 'crs-backend/backend/openApiSpecs/crs-private-spec.yaml'
          revision: 'openApiSpec/crs/crs-private-spec.yaml'
          fail-on-diff: true
          format: text

      # This step will run if the previous one fails
      - name: Show OAS drift output
        if: failure()
        run: echo "${{ steps.oas_diff.outputs.msg }}"
