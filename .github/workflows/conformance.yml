name: OAS Conformance Tests

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment to run conformance tests against
        required: true
        default: integration
        type: choice
        options:
          - integration
          - build

concurrency:
  group: ${{ github.workflow }}-${{ inputs.environment }}
  cancel-in-progress: true

jobs:
  prism-conformance:
    name: Prism Conformance Tests (${{ inputs.environment }})
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    env:
#      TODO: Update URLs, using dev URLs for testing
      UPSTREAM_URL: ${{ inputs.environment == 'build' && 'https://status-list-mock.wallet-onboarding.dev.account.gov.uk' || 'https://status-list-mock.wallet-onboarding.dev.account.gov.uk' }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Prism conformance tests
        run: npm run test:conformance:ci

      - name: Stop Prism
        if: always()
        run: pkill -f "prism proxy" || true

  notify-slack-on-failure:
    name: Notify Slack on Failure
    runs-on: ubuntu-24.04
    needs: [ prism-conformance ]
    if: failure()
    steps:
      - name: Send Slack alert
        uses: slackapi/slack-github-action@b0fa283ad8fea605de13dc3f449259339835fc52 # v2.1.0
        with:
          webhook: ${{ secrets.GH_WORKFLOW_FAILURE_BOT_SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            "repository": "${{ github.repository }}"
            "run": ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}